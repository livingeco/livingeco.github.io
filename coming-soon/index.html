<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon | LivingEco</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: url('https://cdn.pixabay.com/photo/2016/11/29/09/32/forest-1868415_1280.jpg') no-repeat center center;
      background-size: cover;
      overflow: hidden;
      color: #fff;
    }

    /* Overlay for golden-hour glow */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 200, 150, 0.25);
      mix-blend-mode: overlay;
      z-index: 0;
    }

    header {
      position: absolute;
      top: 20px;
      left: 40px;
      font-weight: 600;
      font-size: 24px;
      color: #fff;
      z-index: 2;
    }

    nav {
      position: absolute;
      top: 20px;
      right: 40px;
      z-index: 2;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #fff;
      font-weight: 500;
    }

    .center {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 20px;
      animation: floatText 3s ease-in-out infinite;
    }

    p {
      font-size: 22px;
      animation: slideUp 2s ease-in-out;
    }

    .leaf {
      position: absolute;
      width: 30px;
      height: 30px;
      fill: #fff;
      opacity: 0.8;
      animation: drift 25s linear infinite;
      z-index: 1;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      0% { transform: translateX(-10vw) rotate(0deg); opacity: 1; }
      100% { transform: translateX(110vw) rotate(360deg); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <header>LivingEco</header>
  <nav>
    <a href="https://livingeco.github.io/index.html">Home</a>
  </nav>

  <div class="center">
    <h1>Coming Soon</h1>
    <p>We’re nurturing something beautiful for a greener tomorrow!</p>
  </div>

  <!-- Flowing SVG leaves -->
  <script>
    const leafSVG = `<svg class="leaf" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <path d="M32 2C20 2 8 14 8 28c0 18 24 34 24 34s24-16 24-34C56 14 44 2 32 2z"/>
</svg>`;


    for (let i = 0; i < 20; i++) {
      const leaf = document.createElement('div');
      leaf.innerHTML = leafSVG;
      const svg = leaf.firstChild;
      svg.style.top = Math.random() * 100 + 'vh';
      svg.style.animationDelay = Math.random() * 20 + 's';
      svg.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(svg);
    }
  </script>
</body>
</html>
