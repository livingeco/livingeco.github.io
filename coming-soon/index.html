<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon | LivingEco</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: url('https://livingeco.github.io/assets/images/Deep_forest_golden_hour.jpeg') no-repeat center center;
      background-size: cover;
      overflow: hidden;
      color: #fff;
    }

    /* Overlay for golden-hour glow */
    body::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.35); /* darker overlay */
  z-index: 0;
}


    header {
      position: absolute;
      top: 20px;
      left: 40px;
      font-weight: 600;
      font-size: 24px;
      color: #fff;
      z-index: 2;
    }

    nav {
      position: absolute;
      top: 20px;
      right: 40px;
      z-index: 2;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #fff;
      font-weight: 500;
    }

    .center {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 20px;
      animation: floatText 3s ease-in-out infinite;
    }

    p {
      font-size: 22px;
      animation: slideUp 2s ease-in-out;
    }

    .raindrop {
  position: absolute;
  width: 2px;
  height: 15px;
  background: rgba(255,255,255,0.6); /* light rain color */
  border-radius: 2px;
  animation: rainFall 1s linear infinite;
  z-index: 1;
}

@keyframes rainFall {
  0% { transform: translateY(-20px); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      0% { transform: translateX(-10vw) rotate(0deg); opacity: 1; }
      100% { transform: translateX(110vw) rotate(360deg); opacity: 0.8; }
    }
  </style>
  <style>
    /* Small test button */
    #testBtn {
      position: absolute;
      bottom: 15px;   /* adjust position */
      right: 15px;
      padding: 6px 10px;
      font-size: 2px;
      background: #2e7d32;   /* eco green */
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      z-index: 9999;
    }

    #testBtn:hover {
      background: #1b5e20;
    }
  </style>
</head>
<body>
  <header>LivingEco</header>
  <nav>
    <a href="https://livingeco.github.io/index.html">Home</a>
  </nav>

  <div class="center">
    <h1>Coming Soon</h1>
    <p>We’re nurturing something beautiful for a greener tomorrow!</p>
  </div>

  <script>
  for (let i = 0; i < 100; i++) {   // number of drops
    const drop = document.createElement('div');
    drop.classList.add('raindrop');
    drop.style.left = Math.random() * 100 + 'vw';   // random horizontal position
    drop.style.animationDelay = Math.random() * 2 + 's'; // staggered start
    drop.style.animationDuration = (0.8 + Math.random() * 0.5) + 's'; // varied speed
    document.body.appendChild(drop);
  }
</script>

<button id="testBtn" onclick="window.location.href='https://livingeco.github.io/bathroom-swaps/index.html'">
    Test Page
  </button>


</body>
</html>
