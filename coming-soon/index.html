<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon | LivingEco</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #a8e6cf, #dcedc1, #ffd3b6);
      background-size: 300% 300%;
      animation: gradientShift 12s ease infinite;
      overflow: hidden;
      color: #2e2e2e;
    }

    header {
      position: absolute;
      top: 20px;
      left: 40px;
      font-weight: 600;
      font-size: 24px;
      color: #2e7d32;
    }

    nav {
      position: absolute;
      top: 20px;
      right: 40px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #2e7d32;
      font-weight: 500;
    }

    .center {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 20px;
      color: #2e7d32;
      animation: floatText 3s ease-in-out infinite;
    }

    p {
      font-size: 22px;
      color: #4f4f4f;
      animation: slideUp 2s ease-in-out;
    }

    .leaf {
      position: absolute;
      width: 30px;
      height: 30px;
      fill: #2e7d32;
      opacity: 0.7;
      animation: drift 20s linear infinite;
    }

    .tree-line {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 150px;
      background: url('https://cdn.pixabay.com/photo/2017/01/31/17/44/trees-2025868_1280.png') repeat-x bottom;
      background-size: contain;
      opacity: 0.4;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      0% { transform: translateX(-10vw) rotate(0deg); opacity: 1; }
      100% { transform: translateX(110vw) rotate(360deg); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <header>LivingEco</header>
  <nav>
    <a href="https://livingeco.github.io/index.html">Home</a>
  </nav>

  <div class="center">
    <h1>Coming Soon</h1>
    <p>We’re nurturing something beautiful for a greener tomorrow!</p>
  </div>

  <div class="tree-line"></div>

  <!-- Flowing SVG leaves -->
  <script>
    const leafSVG = `<svg class="leaf" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M12 2C8 2 4 6 4 10c0 6 8 12 8 12s8-6 8-12c0-4-4-8-8-8z"/>
    </svg>`;

    for (let i = 0; i < 20; i++) {
      const leaf = document.createElement('div');
      leaf.innerHTML = leafSVG;
      const svg = leaf.firstChild;
      svg.style.top = Math.random() * 100 + 'vh';
      svg.style.animationDelay = Math.random() * 15 + 's';
      svg.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(svg);
    }
  </script>
</body>
</html>
