<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon | LivingEco</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: url('https://livingeco.github.io/assets/images/Deep_forest_golden_hour.jpeg') no-repeat center center;
      background-size: cover;
      overflow: hidden;
      color: #fff;
    }

    /* Overlay for golden-hour glow */
    body::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.35); /* darker overlay */
  z-index: 0;
}


    header {
      position: absolute;
      top: 20px;
      left: 40px;
      font-weight: 600;
      font-size: 24px;
      color: #fff;
      z-index: 2;
    }

    nav {
      position: absolute;
      top: 20px;
      right: 40px;
      z-index: 2;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #fff;
      font-weight: 500;
    }

    .center {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 20px;
      animation: floatText 3s ease-in-out infinite;
    }

    p {
      font-size: 22px;
      animation: slideUp 2s ease-in-out;
    }

    .orb {
  position: absolute;
  width: 20px;
  height: 20px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: floatOrb 18s linear infinite;
}

@keyframes floatOrb {
  0% { transform: translateX(-10vw) translateY(0); opacity: 0.6; }
  50% { transform: translateX(50vw) translateY(-20px); opacity: 1; }
  100% { transform: translateX(110vw) translateY(0); opacity: 0.6; }
}

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      0% { transform: translateX(-10vw) rotate(0deg); opacity: 1; }
      100% { transform: translateX(110vw) rotate(360deg); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <header>LivingEco</header>
  <nav>
    <a href="https://livingeco.github.io/index.html">Home</a>
  </nav>

  <div class="center">
    <h1>Coming Soon</h1>
    <p>We’re nurturing something beautiful for a greener tomorrow!</p>
  </div>

  <!-- Flowing SVG leaves -->
  <script>
  for (let i = 0; i < 15; i++) {
    const orb = document.createElement('div');
    orb.classList.add('orb');
    orb.style.top = Math.random() * 100 + 'vh';
    orb.style.animationDelay = Math.random() * 10 + 's';
    document.body.appendChild(orb);
  }
</script>

</body>
</html>
