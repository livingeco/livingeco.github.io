<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon | LivingEco</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #a8e6cf, #dcedc1, #ffd3b6);
      background-size: 300% 300%;
      animation: gradientShift 10s ease infinite;
      overflow: hidden;
      color: #2e2e2e;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 20px;
      color: #2e7d32;
      animation: floatText 3s ease-in-out infinite;
    }

    p {
      font-size: 22px;
      color: #4f4f4f;
      animation: slideUp 2s ease-in-out;
    }

    .leaf {
      position: absolute;
      width: 20px;
      height: 20px;
      background: url('https://cdn-icons-png.flaticon.com/512/765/765494.png') no-repeat center/contain;
      opacity: 0.7;
      animation: fall 10s linear infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌱 Coming Soon</h1>
    <p>We’re nurturing something beautiful for a greener tomorrow.</p>
  </div>

  <!-- Floating leaves -->
  <script>
    for (let i = 0; i < 15; i++) {
      const leaf = document.createElement('div');
      leaf.classList.add('leaf');
      leaf.style.left = Math.random() * 100 + 'vw';
      leaf.style.animationDelay = Math.random() * 10 + 's';
      leaf.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(leaf);
    }
  </script>
</body>
</html>
